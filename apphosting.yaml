# Firebase App Hosting configuration file.
# Learn more: https://firebase.google.com/docs/app-hosting/configure

kind: "AppHostingConfig"
schemaVersion: "v1"

# Environment variables
env:
  - variable: "FIREBASE_SERVICE_ACCOUNT"
    value: "${{ params.FIREBASE_SERVICE_ACCOUNT }}"

# Secret parameters
params:
  - name: "FIREBASE_SERVICE_ACCOUNT"
    type: "secret"
